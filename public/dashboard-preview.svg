<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" fill="none">
  <rect width="720" height="400" rx="16" fill="#FFFFFF"/>
  <!-- browser chrome -->
  <rect x="0" y="0" width="720" height="40" rx="16" fill="#FFF8ED"/>
  <rect x="0" y="32" width="720" height="8" fill="#FFF8ED"/>
  <circle cx="24" cy="20" r="5" fill="#FF4D6A"/>
  <circle cx="40" cy="20" r="5" fill="#F5A623"/>
  <circle cx="56" cy="20" r="5" fill="#22C55E"/>
  <rect x="80" y="13" width="180" height="14" rx="7" fill="#FAFAF8" opacity="0.9"/>
  <text x="92" y="23" font-size="8" fill="#6B7280" font-family="monospace">1Grow.in/dashboard</text>
  <!-- sidebar -->
  <rect x="0" y="40" width="140" height="360" fill="#FFF8ED"/>
  <rect x="0" y="40" width="140" height="360" fill="#E8E4DF" opacity="0.15"/>
  <!-- nav items -->
  <rect x="10" y="55" width="120" height="28" rx="8" fill="rgba(245,166,35,0.12)"/>
  <text x="22" y="74" font-size="12" fill="#1A1A2E" font-family="sans-serif" font-weight="600">Overview</text>
  <rect x="10" y="88" width="120" height="28" rx="8" fill="none"/>
  <text x="22" y="107" font-size="12" fill="#6B7280" font-family="sans-serif">Leads</text>
  <rect x="10" y="121" width="120" height="28" rx="8" fill="none"/>
  <text x="22" y="140" font-size="12" fill="#6B7280" font-family="sans-serif">Students</text>
  <rect x="10" y="154" width="120" height="28" rx="8" fill="none"/>
  <text x="22" y="173" font-size="12" fill="#6B7280" font-family="sans-serif">Inventory</text>
  <rect x="10" y="187" width="120" height="28" rx="8" fill="none"/>
  <text x="22" y="206" font-size="12" fill="#6B7280" font-family="sans-serif">Bookings</text>
  <rect x="10" y="220" width="120" height="28" rx="8" fill="none"/>
  <text x="22" y="239" font-size="12" fill="#6B7280" font-family="sans-serif">Payments</text>
  <!-- main area -->
  <rect x="140" y="40" width="580" height="360" fill="#FAFAF8"/>
  <!-- header -->
  <text x="160" y="70" font-size="16" fill="#1A1A2E" font-family="sans-serif" font-weight="700">Revenue &amp; Enrollments</text>
  <rect x="320" y="60" width="50" height="18" rx="8" fill="#F5A623"/>
  <text x="330" y="73" font-size="9" fill="#1A1A2E" font-family="sans-serif" font-weight="600">This Month</text>
  <!-- legend -->
  <rect x="160" y="82" width="8" height="8" rx="2" fill="#F5A623"/>
  <text x="172" y="90" font-size="10" fill="#6B7280" font-family="sans-serif">Revenue</text>
  <rect x="222" y="82" width="8" height="8" rx="2" fill="#3366FF"/>
  <text x="234" y="90" font-size="10" fill="#6B7280" font-family="sans-serif">Enrollments</text>
  <!-- stats row -->
  <rect x="160" y="100" width="165" height="72" rx="10" fill="#FFF8ED" stroke="#E8E4DF" stroke-width="1"/>
  <text x="174" y="120" font-size="10" fill="#6B7280" font-family="sans-serif">Total Revenue</text>
  <text x="174" y="148" font-size="22" fill="#1A1A2E" font-family="sans-serif" font-weight="700">₹8.6L</text>
  <path d="M178 155l4-5 4 5" stroke="#22C55E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="190" y="159" font-size="10" fill="#22C55E" font-family="sans-serif" font-weight="600">+12.4%</text>

  <rect x="340" y="100" width="165" height="72" rx="10" fill="#FFF8ED" stroke="#E8E4DF" stroke-width="1"/>
  <text x="354" y="120" font-size="10" fill="#6B7280" font-family="sans-serif">Active Students</text>
  <text x="354" y="148" font-size="22" fill="#1A1A2E" font-family="sans-serif" font-weight="700">1,284</text>
  <path d="M358 155l4-5 4 5" stroke="#22C55E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="370" y="159" font-size="10" fill="#22C55E" font-family="sans-serif" font-weight="600">+8.1%</text>

  <rect x="520" y="100" width="170" height="72" rx="10" fill="#FFF8ED" stroke="#E8E4DF" stroke-width="1"/>
  <text x="534" y="120" font-size="10" fill="#6B7280" font-family="sans-serif">Utilization</text>
  <text x="534" y="148" font-size="22" fill="#1A1A2E" font-family="sans-serif" font-weight="700">92%</text>
  <path d="M538 155l4-5 4 5" stroke="#22C55E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="550" y="159" font-size="10" fill="#22C55E" font-family="sans-serif" font-weight="600">+3.7%</text>

  <!-- chart area -->
  <rect x="160" y="185" width="530" height="155" rx="10" fill="#FFF8ED" stroke="#E8E4DF" stroke-width="1"/>
  <!-- chart bars -->
  <g transform="translate(175, 210)">
    <line x1="0" y1="100" x2="480" y2="100" stroke="#E8E4DF" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="0" y1="75" x2="480" y2="75" stroke="#E8E4DF" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="0" y1="50" x2="480" y2="50" stroke="#E8E4DF" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="0" y1="25" x2="480" y2="25" stroke="#E8E4DF" stroke-width="0.5" stroke-dasharray="2,2"/>
    <rect x="4" y="58" width="10" height="42" rx="2" fill="#F5A623"/> <rect x="16" y="72" width="10" height="28" rx="2" fill="#3366FF"/>
    <rect x="32" y="42" width="10" height="58" rx="2" fill="#F5A623"/> <rect x="44" y="65" width="10" height="35" rx="2" fill="#3366FF"/>
    <rect x="60" y="51" width="10" height="49" rx="2" fill="#F5A623"/> <rect x="72" y="70" width="10" height="30" rx="2" fill="#3366FF"/>
    <rect x="88" y="30" width="10" height="70" rx="2" fill="#F5A623"/> <rect x="100" y="55" width="10" height="45" rx="2" fill="#3366FF"/>
    <rect x="116" y="36" width="10" height="64" rx="2" fill="#F5A623"/> <rect x="128" y="62" width="10" height="38" rx="2" fill="#3366FF"/>
    <rect x="144" y="18" width="10" height="82" rx="2" fill="#F5A623"/> <rect x="156" y="48" width="10" height="52" rx="2" fill="#3366FF"/>
    <rect x="172" y="25" width="10" height="75" rx="2" fill="#F5A623"/> <rect x="184" y="52" width="10" height="48" rx="2" fill="#3366FF"/>
    <rect x="200" y="4" width="10" height="96" rx="2" fill="#F5A623"/> <rect x="212" y="40" width="10" height="60" rx="2" fill="#3366FF"/>
    <rect x="228" y="12" width="10" height="88" rx="2" fill="#F5A623"/> <rect x="240" y="45" width="10" height="55" rx="2" fill="#3366FF"/>
    <rect x="256" y="28" width="10" height="72" rx="2" fill="#F5A623"/> <rect x="268" y="58" width="10" height="42" rx="2" fill="#3366FF"/>
    <rect x="284" y="10" width="10" height="90" rx="2" fill="#F5A623"/> <rect x="296" y="42" width="10" height="58" rx="2" fill="#3366FF"/>
    <rect x="312" y="0" width="10" height="100" rx="2" fill="#F5A623"/> <rect x="324" y="35" width="10" height="65" rx="2" fill="#3366FF"/>
    <!-- month labels -->
    <text x="4" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">Jan</text>
    <text x="32" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">Feb</text>
    <text x="60" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">Mar</text>
    <text x="88" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">Apr</text>
    <text x="116" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">May</text>
    <text x="144" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">Jun</text>
    <text x="172" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">Jul</text>
    <text x="200" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">Aug</text>
    <text x="228" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">Sep</text>
    <text x="256" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">Oct</text>
    <text x="284" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">Nov</text>
    <text x="312" y="112" font-size="7" fill="#9CA3AF" font-family="sans-serif">Dec</text>
  </g>
</svg>
